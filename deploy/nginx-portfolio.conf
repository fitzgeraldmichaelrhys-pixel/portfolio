# Place in /etc/nginx/sites-available/portfolio
# Replace YOUR_DOMAIN before enabling / running certbot.
#
# worker_connections: default 768 is fine for a portfolio on 2 GB RAM.
# To tune globally, edit /etc/nginx/nginx.conf inside the events { } block:
#   worker_connections 1024;
# (Only raise if you expect sustained high concurrency — unlikely for this site.)

server {
    listen 80;
    listen [::]:80;
    server_name michaelrhysfitzgerald.online www.michaelrhysfitzgerald.online;

    root /var/www/portfolio;
    index index.html;

    # Static site — no uploads; keep body size tiny
    client_max_body_size 1m;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    open_file_cache max=1000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_vary on;
    gzip_types text/css application/javascript application/json image/svg+xml text/plain;
}
