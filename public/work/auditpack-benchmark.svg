      <stop offset="0%" stop-color="#14171c"/>
      <stop offset="100%" stop-color="#0e1014"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#a8d636"/>
