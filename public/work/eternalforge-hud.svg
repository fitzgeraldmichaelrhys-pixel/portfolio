  <rect x="180" y="568" width="120" height="20" rx="4" fill="#252a34"/>
  <text x="192" y="582" font-family="ui-monospace,monospace" font-size="10" fill="#8b93a7">Step tick</text>
  <text x="32" y="608" font-family="ui-monospace,monospace" font-size="12" fill="#5c6478">PLACEHOLDER · HUD</text>
