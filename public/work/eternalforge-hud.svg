<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 630" fill="none">
  <rect width="840" height="630" fill="#0e1014"/>
  <rect x="1" y="1" width="838" height="628" stroke="rgba(199,255,66,0.35)" stroke-width="2" fill="none"/>
  <text x="32" y="48" font-family="system-ui,sans-serif" font-size="11" fill="#c7ff42" letter-spacing="0.14em">ETERNALFORGE</text>
  <text x="32" y="88" font-family="system-ui,sans-serif" font-size="26" font-weight="700" fill="#f4f5f7">Runtime HUD</text>
  <!-- canvas viewport -->
  <rect x="32" y="112" width="520" height="390" rx="8" fill="#14171c" stroke="rgba(255,255,255,0.08)"/>
  <circle cx="180" cy="240" r="40" fill="rgba(199,255,66,0.15)" stroke="#c7ff42"/>
  <circle cx="320" cy="300" r="24" fill="rgba(180,140,80,0.2)" stroke="#b4a060"/>
  <circle cx="420" cy="220" r="56" fill="rgba(199,255,66,0.08)" stroke="rgba(199,255,66,0.4)"/>
  <text x="48" y="140" font-family="ui-monospace,monospace" font-size="10" fill="#8b93a7">CANVAS · 60 FPS</text>
  <!-- inspector panel -->
  <rect x="572" y="112" width="236" height="390" rx="8" fill="#1c2028" stroke="rgba(255,255,255,0.06)"/>
  <text x="588" y="140" font-family="ui-monospace,monospace" font-size="10" fill="#8b93a7">ENTITY INSPECTOR</text>
  <rect x="588" y="156" width="204" height="64" rx="4" fill="#14171c" stroke="rgba(199,255,66,0.2)"/>
  <text x="600" y="178" font-family="ui-monospace,monospace" font-size="11" fill="#f4f5f7">Civilization #7</text>
  <text x="600" y="198" font-family="ui-monospace,monospace" font-size="10" fill="#8b93a7">Alleles: AG·CT·TT</text>
  <text x="600" y="214" font-family="ui-monospace,monospace" font-size="10" fill="#c7ff42">Deterministic </text>
  <!-- stat rows -->
  <g font-family="ui-monospace,monospace" font-size="10" fill="#8b93a7">
    <text x="588" y="252">Population</text>
    <text x="760" y="252" fill="#f4f5f7" text-anchor="end">12,408</text>
    <text x="588" y="276">Territory</text>
    <text x="760" y="276" fill="#f4f5f7" text-anchor="end">847 tiles</text>
    <text x="588" y="300">Worker load</text>
    <text x="760" y="300" fill="#c7ff42" text-anchor="end">18%</text>
    <text x="588" y="324">Tick clock</text>
    <text x="760" y="324" fill="#f4f5f7" text-anchor="end">1,842</text>
  </g>
  <!-- timeline -->
  <rect x="588" y="348" width="204" height="8" rx="2" fill="#252a34"/>
  <rect x="588" y="348" width="128" height="8" rx="2" fill="#c7ff42" opacity="0.7"/>
  <!-- bottom bar -->
  <rect x="32" y="524" width="776" height="72" rx="8" fill="#1c2028" stroke="rgba(255,255,255,0.06)"/>
  <text x="48" y="556" font-family="ui-monospace,monospace" font-size="10" fill="#8b93a7">WEB WORKER · SIM ISOLATED</text>
  <rect x="48" y="568" width="120" height="20" rx="4" fill="rgba(199,255,66,0.12)" stroke="rgba(199,255,66,0.35)"/>
