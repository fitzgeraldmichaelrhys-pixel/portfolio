<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1680 720" fill="none">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0c10"/>
      <stop offset="60%" stop-color="#14171c"/>
      <stop offset="100%" stop-color="#1a1f28"/>
    </linearGradient>
    <linearGradient id="terrain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#252a34"/>
      <stop offset="100%" stop-color="#14171c"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="rgba(199,255,66,0.12)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="1680" height="720" fill="url(#sky)"/>
  <rect width="1680" height="720" fill="url(#glow)"/>
  <rect x="1" y="1" width="1678" height="718" stroke="rgba(199,255,66,0.35)" stroke-width="2" fill="none"/>
  <text x="48" y="52" font-family="system-ui,sans-serif" font-size="11" fill="#c7ff42" letter-spacing="0.14em">ETERNALFORGE</text>
  <!-- terrain grid -->
  <g opacity="0.35">
    <path d="M0 480 L1680 480" stroke="rgba(199,255,66,0.15)" stroke-width="1"/>
    <path d="M0 520 L1680 520" stroke="rgba(199,255,66,0.08)" stroke-width="1"/>
    <path d="M0 560 L1680 560" stroke="rgba(199,255,66,0.08)" stroke-width="1"/>
    <path d="M280 400 L280 720" stroke="rgba(199,255,66,0.08)" stroke-width="1"/>
    <path d="M560 400 L560 720" stroke="rgba(199,255,66,0.08)" stroke-width="1"/>
    <path d="M840 400 L840 720" stroke="rgba(199,255,66,0.08)" stroke-width="1"/>
    <path d="M1120 400 L1120 720" stroke="rgba(199,255,66,0.08)" stroke-width="1"/>
    <path d="M1400 400 L1400 720" stroke="rgba(199,255,66,0.08)" stroke-width="1"/>
  </g>
  <!-- landmass -->
  <path d="M0 520 Q200 480 400 500 T800 470 T1200 490 T1680 460 L1680 720 L0 720 Z" fill="url(#terrain)" opacity="0.9"/>
  <!-- settlements -->
  <circle cx="420" cy="490" r="28" fill="rgba(199,255,66,0.2)" stroke="#c7ff42" stroke-width="1.5"/>
  <circle cx="420" cy="490" r="8" fill="#c7ff42"/>
  <circle cx="920" cy="470" r="40" fill="rgba(199,255,66,0.12)" stroke="rgba(199,255,66,0.5)" stroke-width="1.5"/>
  <circle cx="920" cy="470" r="12" fill="#c7ff42" opacity="0.8"/>
  <circle cx="1280" cy="500" r="22" fill="rgba(180,140,80,0.15)" stroke="#b4a060" stroke-width="1.5"/>
  <!-- entity paths -->
  <path d="M420 490 Q560 440 720 460 Q860 480 920 470" stroke="#c7ff42" stroke-width="1" fill="none" opacity="0.4" stroke-dasharray="6 4"/>
  <path d="M920 470 Q1040 520 1180 490 Q1240 480 1280 500" stroke="#b4a060" stroke-width="1" fill="none" opacity="0.35" stroke-dasharray="6 4"/>
  <!-- HUD corner -->
  <rect x="48" y="80" width="220" height="100" rx="6" fill="rgba(14,16,20,0.85)" stroke="rgba(255,255,255,0.08)"/>
  <text x="64" y="108" font-family="ui-monospace,monospace" font-size="10" fill="#8b93a7">SEED</text>
  <text x="64" y="132" font-family="ui-monospace,monospace" font-size="14" fill="#c7ff42">0x8F3A2C91</text>
  <text x="64" y="158" font-family="ui-monospace,monospace" font-size="10" fill="#8b93a7">TICK · GEN · POP</text>
  <text x="64" y="172" font-family="ui-monospace,monospace" font-size="11" fill="#f4f5f7">1842 · 7 · 12.4k</text>
  <text x="48" y="700" font-family="ui-monospace,monospace" font-size="13" fill="#5c6478">PLACEHOLDER · WORLD SIM</text>
</svg>
