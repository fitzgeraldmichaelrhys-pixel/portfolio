  <!-- main panel -->
  <rect x="312" y="112" width="1320" height="568" rx="8" fill="#1c2028" stroke="rgba(255,255,255,0.06)"/>
  <text x="336" y="152" font-family="system-ui,sans-serif" font-size="28" font-weight="700" fill="#f4f5f7" letter-spacing="-0.02em">Compliance OS</text>
  <text x="336" y="182" font-family="ui-monospace,monospace" font-size="12" fill="#8b93a7">ISO readiness · multi-tenant · fail-closed RAG</text>
