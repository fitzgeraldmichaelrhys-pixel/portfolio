  <g filter="url(#glow)">
    <rect x="336" y="220" width="200" height="120" rx="8" fill="#14171c" stroke="rgba(199,255,66,0.25)"/>
    <text x="356" y="260" font-family="system-ui,sans-serif" font-size="48" font-weight="800" fill="#c7ff42">87</text>
    <text x="356" y="288" font-family="ui-monospace,monospace" font-size="11" fill="#8b93a7">READINESS SCORE</text>
    <rect x="556" y="220" width="200" height="120" rx="8" fill="#14171c" stroke="rgba(255,255,255,0.08)"/>
    <text x="576" y="260" font-family="system-ui,sans-serif" font-size="48" font-weight="800" fill="#f4f5f7">4</text>
    <text x="576" y="288" font-family="ui-monospace,monospace" font-size="11" fill="#8b93a7">ISO STANDARDS</text>
    <rect x="776" y="220" width="200" height="120" rx="8" fill="#14171c" stroke="rgba(255,255,255,0.08)"/>
    <text x="796" y="260" font-family="system-ui,sans-serif" font-size="48" font-weight="800" fill="#f4f5f7">13</text>
    <text x="796" y="288" font-family="ui-monospace,monospace" font-size="11" fill="#8b93a7">VALIDATION CHECKS</text>
  </g>
  <!-- chart area -->
  <rect x="336" y="368" width="820" height="280" rx="8" fill="#14171c" stroke="rgba(255,255,255,0.06)"/>
  <polyline points="360,600 420,520 480,540 540,460 600,480 660,400 720,420 780,360 840,380 900,320 960,340 1020,280 1080,300 1140,260" stroke="#c7ff42" stroke-width="2.5" fill="none" opacity="0.9"/>
  <rect x="1180" y="368" width="428" height="280" rx="8" fill="#14171c" stroke="rgba(255,255,255,0.06)"/>
  <rect x="1204" y="392" width="380" height="12" rx="2" fill="#252a34"/>
  <rect x="1204" y="420" width="320" height="12" rx="2" fill="#252a34"/>
  <rect x="1204" y="448" width="360" height="12" rx="2" fill="#252a34"/>
  <rect x="1204" y="500" width="380" height="48" rx="6" fill="rgba(199,255,66,0.1)" stroke="rgba(199,255,66,0.3)"/>
  <text x="1220" y="530" font-family="ui-monospace,monospace" font-size="11" fill="#c7ff42">Evidence pack ready</text>
  <text x="48" y="700" font-family="ui-monospace,monospace" font-size="13" fill="#5c6478" letter-spacing="0.08em">PLACEHOLDER · AUDITPACK HERO</text>
