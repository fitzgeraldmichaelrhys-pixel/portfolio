<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1680 720" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1014"/>
      <stop offset="100%" stop-color="#14171c"/>
    </linearGradient>
    <linearGradient id="forge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c7ff42" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#6b7280" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#c7ff42" stop-opacity="0.35"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1680" height="720" fill="url(#bg)"/>
  <rect x="1" y="1" width="1678" height="718" stroke="url(#forge)" stroke-width="2" fill="none"/>
  <!-- top bar -->
  <rect x="48" y="40" width="1584" height="52" rx="6" fill="#1c2028" stroke="rgba(255,255,255,0.08)"/>
