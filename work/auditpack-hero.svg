  <rect x="1320" y="56" width="88" height="20" rx="4" fill="rgba(199,255,66,0.12)" stroke="rgba(199,255,66,0.35)"/>
  <text x="1336" y="70" font-family="ui-monospace,monospace" font-size="10" fill="#c7ff42">Export</text>
  <!-- sidebar -->
  <rect x="48" y="112" width="240" height="568" rx="8" fill="#14171c" stroke="rgba(255,255,255,0.06)"/>
  <rect x="72" y="140" width="160" height="10" rx="2" fill="#3a4150"/>
  <rect x="72" y="168" width="192" height="8" rx="2" fill="#252a34"/>
